<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Card Producto</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Card 1 — Nike  -->
    <div class="card">
      <div class="img">
        <span class="etiqueta">🔥 Más Vendido</span>
      </div>

      <div class="producto">
        <h3>Nike Air Force 1 07</h3>
        <p class="info">Championes de Moda para Hombre</p>
        <p class="precio">$6.990</p>

        <select class="talle">
          <option>Elegir Talle</option>
          <option>40</option>
          <option>41</option>
          <option>43</option>
        </select>

        <button class="btn-agregar" disabled>Agregar al carrito</button>
        <p class="agotado">AGOTADO</p>
      </div>
    </div>

    <!-- Card 2 — Buzo  -->
    <div class="card-2">
      <div class="img-2">
        <span class="etiqueta">☆ New Season</span>
      </div>

      <div class="producto">
        <h3>Camiseta Uruguay Local</h3>
        <p class="info">Nike Aero-FIT para Hombre</p>
        <p class="precio">$7.990</p>

        <select class="talle">
          <option>Elegir Talle</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
        </select>

        <button class="btn-agregar" disabled>Agregar al carrito</button>
        <p class="entrega">¡LLEGA HOY!</p>
      </div>
    </div>
  </body>
</html>
